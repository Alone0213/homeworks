{% extends "base.html" %}
{% block title %}客户管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-people me-2"></i>客户管理</h5>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal"><i class="bi bi-plus-lg"></i> 新增客户</button>
</div>
<div class="card"><div class="card-body p-0">
    <table class="table table-hover mb-0">
        <thead><tr><th>编号</th><th>名称</th><th>电话</th><th>地址</th><th>邮箱</th><th>操作</th></tr></thead>
        <tbody>
            {% for r in rows %}
            <tr><td>{{ r.CustomerID }}</td><td>{{ r.CustomerName }}</td><td>{{ r.Phone }}</td><td>{{ r.Address or '-' }}</td><td>{{ r.Email or '-' }}</td>
                <td><a href="/customers/delete/{{ r.CustomerID }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除？')"><i class="bi bi-trash"></i></a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div></div>

<div class="modal fade" id="addModal"><div class="modal-dialog"><div class="modal-content">
    <form method="post" action="/customers/add">
        <div class="modal-header bg-primary text-white"><h6 class="mb-0">新增客户</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="mb-2"><label class="form-label">名称 <span class="text-danger">*</span></label><input name="name" class="form-control" required></div>
            <div class="row g-2">
                <div class="col-6"><label class="form-label">电话 <span class="text-danger">*</span></label><input name="phone" class="form-control" required></div>
                <div class="col-6"><label class="form-label">邮箱</label><input name="email" class="form-control" type="email"></div>
            </div>
            <div class="mt-2"><label class="form-label">地址</label><input name="address" class="form-control"></div>
        </div>
        <div class="modal-footer"><button type="submit" class="btn btn-primary">保存</button></div>
    </form>
</div></div></div>
{% endblock %}
